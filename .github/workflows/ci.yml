name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint (ruff)
        run: ruff check app alembic tests
      - name: Test (pytest)
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: tin
          POSTGRES_PASSWORD: tin
          POSTGRES_DB: tin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Owner role for DDL (migrations) and the cross-tenant platform path.
      DATABASE_URL: postgresql+asyncpg://tin:tin@localhost:5432/tin
      DATABASE_ADMIN_URL: postgresql+asyncpg://tin:tin@localhost:5432/tin
      # Non-superuser RLS-enforced app role created by migration 0002.
      TEST_APP_DATABASE_URL: postgresql+asyncpg://tin_app:tin_app@localhost:5432/tin
      APP_DB_PASSWORD: tin_app
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Migrate (alembic upgrade head)
        run: alembic upgrade head
      - name: Integration tests (pytest)
        run: pytest tests/integration -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, integration, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose -f infra/compose/docker-compose.yml config >/dev/null
      - name: Build backend image
        run: docker build -t tin-portal-backend ./backend
      - name: Build frontend image
        run: docker build -t tin-portal-frontend ./frontend
