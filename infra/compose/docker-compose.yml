# TIN Collection Portal — local development stack (Sprint 0).
# Run from repo root:  docker compose -f infra/compose/docker-compose.yml --env-file backend/.env up --build
# (copy backend/.env.example -> backend/.env first)
#
# Build contexts are relative to this file (infra/compose/), hence ../../backend etc.

name: tin-portal

services:
  proxy:
    image: traefik:v3.1
    # File-provider config (no docker socket — reliable on Docker Desktop/Windows).
    volumes:
      - ../nginx-or-traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../nginx-or-traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "80:80"
      - "8090:8080" # Traefik dashboard
    depends_on:
      - web
      - api

  web:
    build:
      context: ../../frontend
    environment:
      NEXT_PUBLIC_API_BASE: /api/v1
      # Server-side BFF reaches the backend directly (not via the public proxy).
      API_INTERNAL_URL: http://api:8000/api/v1
    expose:
      - "3000"
    depends_on:
      - api

  # One-shot: runs DB migrations as the OWNER role (tin) before the app starts.
  # Migration 0002 creates the non-superuser app role (tin_app) + RLS policies.
  migrate:
    build:
      context: ../../backend
    command: alembic upgrade head
    env_file:
      - path: ../../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tin:tin@db:5432/tin # owner role for DDL
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # One-shot: bootstrap the first platform admin (idempotent). Connects as the
  # RLS-enforced app role; platform_admins is not tenant-scoped.
  seed:
    build:
      context: ../../backend
    command: python -m app.seed
    env_file:
      - path: ../../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tin_app:tin_app@db:5432/tin
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: ../../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: ../../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tin_app:tin_app@db:5432/tin # RLS-enforced app role
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      storage:
        condition: service_started

  worker:
    build:
      context: ../../backend
    command: arq app.worker.WorkerSettings
    env_file:
      - path: ../../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tin_app:tin_app@db:5432/tin
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      db:
        condition: service_healthy

  scheduler:
    build:
      context: ../../backend
    command: arq app.scheduler.SchedulerSettings
    env_file:
      - path: ../../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tin_app:tin_app@db:5432/tin
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tin
      POSTGRES_PASSWORD: tin
      POSTGRES_DB: tin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tin"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  storage:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

  mail:
    image: axllent/mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  pgdata:
  minio:
