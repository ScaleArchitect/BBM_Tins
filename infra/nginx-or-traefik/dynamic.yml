# Traefik v3 dynamic configuration (local dev) — file provider.
# Routes /api -> FastAPI backend, everything else -> Next.js frontend.

http:
  routers:
    api:
      rule: "PathPrefix(`/api`)"
      service: api
      entryPoints: [web]
      priority: 10
    web:
      rule: "PathPrefix(`/`)"
      service: web
      entryPoints: [web]
      priority: 1

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://api:8000"
    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"
